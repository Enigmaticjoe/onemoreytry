# ══════════════════════════════════════════════════════════════════════════════
#  Portainer Agent — Global Swarm Service
# ══════════════════════════════════════════════════════════════════════════════
#
#  Deploys Portainer Agent on EVERY node in the Swarm automatically.
#  Portainer BE on the manager connects to this agent stack to see all nodes.
#
#  Deploy:
#    docker stack deploy -c swarm/portainer-agent-stack.yml portainer_agent_stack
#
#  In Portainer BE UI → Add Environment → Docker Swarm → Agent
#    Agent URL: tasks.portainer_agent_stack_agent:9001
#
# ══════════════════════════════════════════════════════════════════════════════
version: "3.2"

services:
  agent:
    image: portainer/agent:latest
    environment:
      AGENT_CLUSTER_ADDR: tasks.agent
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
    networks:
      - portainer_agent_network
    deploy:
      mode: global
      placement:
        constraints:
          - node.platform.os == linux

networks:
  portainer_agent_network:
    driver: overlay
    attachable: true
