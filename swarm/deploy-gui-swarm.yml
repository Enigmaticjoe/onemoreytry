# ══════════════════════════════════════════════════════════════════════════════
#  Deploy GUI — Docker Swarm Stack
# ══════════════════════════════════════════════════════════════════════════════
#
#  Deploys the homelab Deploy GUI on NODE_B (Unraid / gateway).
#  SSH keys are bind-mounted from the host so the GUI can reach other nodes.
#
#  Deploy via Portainer BE:
#    Environments → Homelab Swarm → Stacks → Add Stack → Upload this file
#
#  Deploy via CLI:
#    docker stack deploy -c swarm/deploy-gui-swarm.yml deploy_gui
#
# ══════════════════════════════════════════════════════════════════════════════
version: "3.8"

services:
  deploy-gui:
    image: node:20-alpine
    working_dir: /homelab/deploy-gui
    command: ["node", "deploy-gui.js"]
    ports:
      - "9999:9999"
    volumes:
      - type: bind
        source: /mnt/user/appdata/homelab
        target: /homelab
        read_only: true
      - type: bind
        source: /root/.ssh
        target: /root/.ssh
        read_only: true
      - deploy_gui_data:/homelab/deploy-gui/data
    environment:
      NODE_ENV: production
    networks:
      - deploy_gui_net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.homelab.node == B
      restart_policy:
        condition: on-failure
        delay: 5s
      resources:
        limits:
          memory: 512M
      update_config:
        parallelism: 1
        failure_action: rollback

volumes:
  deploy_gui_data:
    driver: local

networks:
  deploy_gui_net:
    driver: overlay
    attachable: true
