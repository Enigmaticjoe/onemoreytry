# Recyclarr configuration template — Project Chimera
# Place at: /mnt/user/appdata/DUMB/recyclarr/recyclarr.yml
#
# Run sync: docker exec recyclarr recyclarr sync
# Dry run:  docker exec recyclarr recyclarr sync --dry-run
#
# Full docs: https://recyclarr.dev/wiki/

sonarr:
  series:
    base_url: http://sonarr:8989
    api_key: !env_var SONARR_API_KEY

    quality_definition:
      type: series

    quality_profiles:
      - name: WEB-1080p
        reset_unmatched_scores:
          enabled: true

    custom_formats:
      - trash_ids:
          # Streaming service sources (score them positively)
          - d660701077794679fd59e8bdf4ce3a5       # AMZN
          - f67c9ca88f463a48346062e8ad07713f       # ATVP
          - 77a7b25585c18af08f60b1547bb9b4fb       # DCU
          - 89358767a60cc28783cdc3d0be9388a4       # DSNP
          - a880d6abc21e7c16884f3ae393f84179       # HMAX
          - 7a235133c87f7da4c8cccceca7e3c7a6       # HULU
          - f6cce30f1733d5c8194222a7507909bb       # PCOK
          - c9fd353f8f5f1baf56dc601c4cb29920       # PMTP
          - e36a0ba1bc902b26ee40818a1d59b8bd       # NF
          - 1656adc6d7bb2c8cca6acfb6592db421       # STAN
        quality_profiles:
          - name: WEB-1080p
            score: 100

      - trash_ids:
          # Unwanted qualities (negative scores)
          - 85c61753df5da1fb2aab6f2a47426b09       # BR-DISK (source disc rip)
          - 9c11cd3f07101cdba90a2d81cf0e56b4       # LQ (low quality)
          - e2315f990da2e2cbfc9fa5b7a6fcfe48       # LQ (release title)
          - 47435ece6b99a0b477caf360e79ba0bb       # x265 (720/1080p)
        quality_profiles:
          - name: WEB-1080p
            score: -10000

radarr:
  movies:
    base_url: http://radarr:7878
    api_key: !env_var RADARR_API_KEY

    quality_definition:
      type: movie

    quality_profiles:
      - name: SQP-1 (1080p)
        reset_unmatched_scores:
          enabled: true
      - name: SQP-2 (2160p)
        reset_unmatched_scores:
          enabled: true

    custom_formats:
      - trash_ids:
          # Audio formats (score HDR audio highly)
          - 496f355514737f7d83bf7aa4d24f8169       # TrueHD Atmos
          - 2f22d89048b01681dde8afe203bf2e95       # DTS X
          - 417804f7f2c4308c1f4c4a2c10b60d4e       # ATMOS (undefined)
          - 1af239278386be2919e1bcee0bde047e       # DD+ Atmos
          - 3cafb66171b47f226146a0770576870f       # TrueHD
          - dcf3ec6938fa32445f590a4da84256cd       # DTS-HD MA
          - a570d4a0e56a2874b64e5bfa55202a1b       # FLAC
          - e7c2fcae07cbada050a0af3357491d7b       # PCM
          - 8e109e50e0a0b83a5098b056e13bf6db       # DTS-HD HRA
          - 185f1dd7264c4562b9022d963ac37424       # DD+
          - f9f847ac70a0af62ea4a08280b859636       # DTS-ES
          - 1c1a4c5e823891c75bc50380a6866f73       # DTS
          - 240770601cc226190c367ef59aba7463       # AAC
          - c2998bd0d90ed5621d8df281e839436e       # DD
        quality_profiles:
          - name: SQP-1 (1080p)
            score: 0    # Audio scores apply equally across profiles
          - name: SQP-2 (2160p)
            score: 0

      - trash_ids:
          # HDR formats
          - 58d6a88f13e2db7f5059c41047876f00       # DV HDR10
          - e23edd2482476e595fb990b12e7c609c       # DV
          - 55d53828b9d81cbe20b02efd00aa0efd       # DV HLG
          - a3e19f8f627608af0211acd03bf89735       # DV SDR
          - e61e28db95d22bedcadf030b8f156d96       # HDR
          - 2a4d9069cc1fe3242ff9bdaebed239bb       # HDR (undefined)
          - dfb86d5941bc9075d6af23b09c2aeecd       # HDR10
          - b974a6cd08c1066250f1f177d7aa1225       # HDR10+
        quality_profiles:
          - name: SQP-2 (2160p)
            score: 200    # Score HDR highly for the 4K profile
