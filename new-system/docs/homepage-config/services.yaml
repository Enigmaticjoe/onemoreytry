# Homepage — services.yaml for Project Chimera
# Live path: /mnt/user/appdata/DUMB/homepage/config/services.yaml
# Homepage reloads automatically — no restart needed after edits.
# Docs: https://gethomepage.dev/configs/services/

# ─── AI & Voice ───────────────────────────────────────────────────────────────
- AI & Voice:
    - Open WebUI (B):
        href: http://192.168.1.222:3002
        description: AI chat · RTX 4070 · brawn-* models
        icon: open-webui.png
        widget:
          type: customapi
          url: http://192.168.1.222:3002/api/health
          method: GET
          mappings:
            - field: status
              label: Status

    - LiteLLM:
        href: http://192.168.1.222:4000
        description: Unified AI gateway · 13 model routes
        icon: ollama.png
        widget:
          type: customapi
          url: http://192.168.1.222:4000/health/readiness
          method: GET
          headers:
            Authorization: Bearer sk-chimera-master-2026
          mappings:
            - field: status
              label: Gateway

    - Ollama (B):
        href: http://192.168.1.222:11434
        description: GPU inference · RTX 4070 12GB VRAM
        icon: ollama.png
        widget:
          type: customapi
          url: http://192.168.1.222:11434/api/version
          method: GET
          mappings:
            - field: version
              label: Version

    - n8n:
        href: http://192.168.1.222:5678
        description: Workflow automation · voice → media
        icon: n8n.png
        widget:
          type: n8n
          url: http://192.168.1.222:5678
          username: "{{HOMEPAGE_VAR_N8N_USER}}"
          password: "{{HOMEPAGE_VAR_N8N_PASSWORD}}"

    - Whisper API:
        href: http://192.168.1.222:9191
        description: GPU speech-to-text · OpenAI-compatible
        icon: microphone.png
        widget:
          type: customapi
          url: http://192.168.1.222:9191/health
          method: GET
          mappings:
            - field: status
              label: STT

    - SearXNG:
        href: http://192.168.1.222:8082
        description: Private meta-search · AI RAG web source
        icon: searxng.png

