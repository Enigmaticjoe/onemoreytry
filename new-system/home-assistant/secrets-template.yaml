# Home Assistant secrets.yaml template for Project Chimera
# Place at: /config/secrets.yaml on your HA instance (Node D)
#
# Generate tokens: openssl rand -hex 32
# NEVER commit this file — it is .gitignored

# Ollama API key (sk-none works for local Ollama; use LITELLM_MASTER_KEY if via LiteLLM)
ollama_api_key: sk-none

# Home Assistant long-lived access token
# Generate: HA → Profile → Security → Long-Lived Access Tokens
ha_self_token: YOUR_HA_LONG_LIVED_TOKEN

# n8n webhook auth (if you enable authentication on n8n webhooks)
n8n_webhook_secret: YOUR_N8N_WEBHOOK_SECRET
