# Grand Unified AI Home Lab - Unraid AI Stack
# Deploy on Unraid (192.168.1.222) — local AI services for the media machine
#
# Services:
#   Ollama        — Local LLM inference server (CPU/GPU)
#   Open WebUI    — Chat UI wired to Ollama + LiteLLM gateway on Node B
#
# This stack complements the main management stack (docker-compose.yml) and
# the DUMB AIO media stack (media-stack.yml). Together they make Unraid the
# full media server + AI machine in the homelab.
#
# Usage:
#   cp .env.example .env   # fill in required values
#   docker compose -f ai-stack.yml up -d
#
# After startup:
#   Ollama   : http://192.168.1.222:11434
#   Open WebUI: http://192.168.1.222:3020

services:

  # ─── Ollama — local LLM inference ─────────────────────────────────────────
  ollama-unraid:
    image: ollama/ollama:latest
    container_name: ollama_unraid
    restart: unless-stopped
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - TZ=${TZ:-America/Chicago}
    volumes:
      - ${APPDATA_PATH}/ollama:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/version || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - unraid-ai

  # ─── Open WebUI — chat interface wired to Ollama + LiteLLM ────────────────
  open-webui-unraid:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open_webui_unraid
    restart: unless-stopped
    environment:
      # Primary backend: local Ollama on Unraid
      - OLLAMA_BASE_URL=http://ollama-unraid:11434
      # Secondary: LiteLLM gateway on Node B (gives access to all cluster models)
      - OPENAI_API_BASE_URLS=${LITELLM_GATEWAY_URL:-http://192.168.1.222:4000/v1}
      - OPENAI_API_KEYS=${LITELLM_API_KEY:-sk-master-key}
      # Auth
      - WEBUI_AUTH=true
      - WEBUI_NAME=Unraid AI
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
      - TZ=${TZ:-America/Chicago}
    volumes:
      - ${APPDATA_PATH}/open-webui:/app/backend/data
    ports:
      - "3020:8080"
    depends_on:
      ollama-unraid:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - unraid-ai

networks:
  unraid-ai:
    name: unraid-ai
    driver: bridge
