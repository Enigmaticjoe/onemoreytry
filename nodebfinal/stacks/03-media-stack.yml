# Node B Final — Media Stack
# Node B (Unraid) at 192.168.1.222
#
# Full *arr media automation suite with Real-Debrid integration, VPN protection,
# and AI-enhanced features (Whisper subtitles via Bazarr, smart requests via Overseerr).
#
# Containers in this stack:
#   gluetun     — VPN tunnel for all download traffic
#   zurg        — Real-Debrid filesystem daemon
#   rclone-zurg — mounts Real-Debrid content as local filesystem
#   rdt-client  — Real-Debrid torrent/magnet manager (emulates qBittorrent API)
#   prowlarr    — unified indexer manager for all *arr apps
#   sonarr      — TV show automation
#   radarr      — movie automation
#   bazarr      — subtitle automation (AI Whisper support)
#   overseerr   — media request portal
#   tautulli    — watch analytics (feeds AI weekly digest via n8n)
#   plex        — media server (comment out if using Jellyfin only)
#   jellyfin    — media server (comment out if using Plex only)
#   flaresolverr — Cloudflare challenge bypass for Prowlarr indexers
#
# NOTE: Run EITHER plex OR jellyfin (or both if testing). The blueprint recommends
#       keeping only one long-term. Plex if sharing with family; Jellyfin if solo.
#
# Deploy order:
#   gluetun → zurg → rclone-zurg → rdt-client
#   → prowlarr → sonarr → radarr → bazarr
#   → flaresolverr → overseerr → tautulli
#   → plex / jellyfin
#
# Usage:
#   cp ../.env.example ../.env
#   docker compose -f stacks/03-media-stack.yml up -d

services:

  # ─── Gluetun — VPN tunnel (all download traffic routes through this) ────────
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=${VPN_SERVICE_PROVIDER:-private internet access}
      - VPN_TYPE=openvpn
      - OPENVPN_USER=${VPN_USER}
      - OPENVPN_PASSWORD=${VPN_PASSWORD}
      - SERVER_REGIONS=${VPN_REGIONS:-US East}
      - TZ=${TZ:-America/New_York}
    ports:
      - "8090:8090"    # Gluetun HTTP proxy / control panel
    volumes:
      - ${APPDATA_PATH}/gluetun:/gluetun
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- https://api.ipify.org || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s
    networks:
      - media

  # ─── Zurg — Real-Debrid filesystem daemon ───────────────────────────────────
  zurg:
    image: ghcr.io/debridmediamanager/zurg-testing:latest
    container_name: zurg
    restart: unless-stopped
    environment:
      - TZ=${TZ:-America/New_York}
    ports:
      - "9999:9999"
    volumes:
      - ${APPDATA_PATH}/zurg:/app/data
      - ${MEDIA_PATH}/zurg-config:/app/config
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9999/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - media

  # ─── RClone — mounts Real-Debrid/Zurg content as a local filesystem ─────────
  rclone-zurg:
    image: rclone/rclone:latest
    container_name: rclone-zurg
    restart: unless-stopped
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse:/dev/fuse
    security_opt:
      - apparmor:unconfined
    environment:
      - TZ=${TZ:-America/New_York}
    volumes:
      - ${APPDATA_PATH}/rclone:/config/rclone
      - ${MEDIA_PATH}/realdebrid:/mnt/realdebrid:shared
    command: >
      mount zurg: /mnt/realdebrid
      --allow-other
      --allow-non-empty
      --poll-interval 15s
      --dir-cache-time 1000h
      --vfs-read-chunk-size 128M
    depends_on:
      zurg:
        condition: service_healthy
    networks:
      - media

  # ─── RDT Client — Real-Debrid torrent/magnet manager ───────────────────────
  # Emulates qBittorrent API for Sonarr/Radarr → Real-Debrid.
  # This replaces qBittorrent as the download client.
  rdt-client:
    image: rogerfar/rdtclient:latest
    container_name: rdt-client
    restart: unless-stopped
    environment:
      - TZ=${TZ:-America/New_York}
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
    ports:
      - "6500:6500"
    volumes:
      - ${APPDATA_PATH}/rdtclient:/data/db
      - ${MEDIA_PATH}:/mnt/user/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6500 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - media

  # ─── Prowlarr — unified indexer manager ─────────────────────────────────────
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/New_York}
    ports:
      - "9696:9696"
    volumes:
      - ${APPDATA_PATH}/prowlarr:/config
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9696/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - media

  # ─── FlareSolverr — Cloudflare challenge bypass for Prowlarr ────────────────
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    restart: unless-stopped
    environment:
      - LOG_LEVEL=info
      - TZ=${TZ:-America/New_York}
    ports:
      - "8191:8191"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8191/v1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - media

  # ─── Sonarr — TV show automation ────────────────────────────────────────────
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/New_York}
    ports:
      - "8989:8989"
    volumes:
      - ${APPDATA_PATH}/sonarr:/config
      - ${MEDIA_PATH}:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8989/api/v3/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - prowlarr
    networks:
      - media

  # ─── Radarr — movie automation ──────────────────────────────────────────────
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/New_York}
    ports:
      - "7878:7878"
    volumes:
      - ${APPDATA_PATH}/radarr:/config
      - ${MEDIA_PATH}:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7878/api/v3/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - prowlarr
    networks:
      - media

  # ─── Bazarr — subtitle automation with AI Whisper support ───────────────────
  # AI Integration: configure Bazarr to use Wyoming Whisper (port 10300)
  # from the voice stack for AI subtitle generation when no subs are found.
  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    restart: unless-stopped
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/New_York}
    ports:
      - "6767:6767"
    volumes:
      - ${APPDATA_PATH}/bazarr:/config
      - ${MEDIA_PATH}:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6767/api/system/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - sonarr
      - radarr
    networks:
      - media

  # ─── Overseerr — media request portal ──────────────────────────────────────
  # AI Integration: n8n webhook → Ollama "is this worth watching?" → auto-approve
  # or hold for review.
  # NOTE: Consider switching to Seerr (ghcr.io/seerr/seerr:latest) for the
  # maintained fork with native Jellyfin support.
  overseerr:
    image: sctx/overseerr:latest
    container_name: overseerr
    restart: unless-stopped
    environment:
      - TZ=${TZ:-America/New_York}
      - LOG_LEVEL=info
    ports:
      - "5055:5055"
    volumes:
      - ${APPDATA_PATH}/overseerr:/app/config
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5055/api/v1/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - media

  # ─── Tautulli — watch analytics ─────────────────────────────────────────────
  # AI Integration: n8n weekly cron → pull Tautulli stats → Ollama summary
  # → Discord/email weekly watching report.
  tautulli:
    image: lscr.io/linuxserver/tautulli:latest
    container_name: tautulli
    restart: unless-stopped
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/New_York}
    ports:
      - "8181:8181"
    volumes:
      - ${APPDATA_PATH}/tautulli:/config
    healthcheck:
      # Uses a lightweight status endpoint that does not require the API key.
      test: ["CMD-SHELL", "wget -qO- http://localhost:8181/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - media

  # ─── Plex — primary media server ────────────────────────────────────────────
  # Keep if sharing with family (better client ecosystem for non-technical users).
  # Comment out this service if you choose Jellyfin as your sole media server.
  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    restart: unless-stopped
    network_mode: host
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/New_York}
      - VERSION=docker
      - PLEX_CLAIM=${PLEX_CLAIM_TOKEN:-}
      # NVIDIA GPU hardware transcoding
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,video,utility
    volumes:
      - ${APPDATA_PATH}/plex:/config
      - ${MEDIA_PATH}/tv:/data/tv
      - ${MEDIA_PATH}/movies:/data/movies
      - ${MEDIA_PATH}/music:/data/music
      - ${MEDIA_PATH}/realdebrid:/data/realdebrid:ro
      - /dev/shm:/transcode
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:32400/identity || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Jellyfin — free & open-source media server ─────────────────────────────
  # Best choice if it's just you (free hardware transcoding, no cloud dependency).
  # AI Integration: Recommendarr uses Jellyfin library for AI recommendations.
  # Comment out this service if you choose Plex as your sole media server.
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/New_York}
      # NVIDIA GPU hardware transcoding
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,video,utility
    ports:
      - "8096:8096"
      - "8920:8920"    # HTTPS
    volumes:
      - ${APPDATA_PATH}/jellyfin:/config
      - ${MEDIA_PATH}/tv:/data/tv
      - ${MEDIA_PATH}/movies:/data/movies
      - ${MEDIA_PATH}/music:/data/music
      - ${MEDIA_PATH}/realdebrid:/data/realdebrid:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8096/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      rclone-zurg:
        condition: service_started
    networks:
      - media

networks:
  media:
    name: media
    driver: bridge
