# Node B Final — Infrastructure Stack
# Node B (Unraid) at 192.168.1.222
#
# Core infrastructure services: dashboard, monitoring, logging,
# automatic updates, VPN mesh, container management, and secure tunnels.
#
# Deploy order:
#   tailscale → portainer-be → homepage → uptime-kuma → dozzle → watchtower → cloudflared
#
# Usage:
#   cp ../.env.example ../.env
#   docker compose -f stacks/01-infra-stack.yml up -d

services:

  # ─── Tailscale — zero-config VPN mesh for secure remote access ─────────────
  tailscale:
    image: tailscale/tailscale:latest
    container_name: tailscale
    hostname: node-b-unraid
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    # Note: --advertise-exit-node makes this device a Tailscale exit node (routes all
    # remote device traffic through your home network). Requires approval in the
    # Tailscale admin console (https://login.tailscale.com/admin/machines).
    # Remove this flag if you only want remote access without full exit-node routing.
    environment:
      - TS_AUTHKEY=${TAILSCALE_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_EXTRA_ARGS=--advertise-exit-node --advertise-routes=${LOCAL_SUBNET:-192.168.1.0/24}
      - TS_USERSPACE=false
      - TZ=${TZ:-America/New_York}
    volumes:
      - ${APPDATA_PATH}/tailscale:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    network_mode: host

  # ─── Portainer BE — Docker management UI ───────────────────────────────────
  portainer-be:
    image: portainer/portainer-ee:latest
    container_name: portainer-be
    restart: unless-stopped
    ports:
      - "8000:8000"   # Edge tunnel server (for Edge Agents on other nodes)
      - "9000:9000"   # HTTP management UI
      - "9443:9443"   # HTTPS management UI (recommended)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${APPDATA_PATH}/portainer:/data
    environment:
      - TZ=${TZ:-America/New_York}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9000/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - infra

  # ─── Homepage — central dashboard with AI briefing widget ──────────────────
  # AI Integration: Ollama daily-briefing card via custom API widget.
  # See homepage-config/services.yaml for the widget configuration.
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    ports:
      - "8010:3000"
    environment:
      - HOMEPAGE_ALLOWED_HOSTS=*
      - HOMEPAGE_VAR_HA_TOKEN=${HA_TOKEN:-}
      - TZ=${TZ:-America/New_York}
    volumes:
      - ${APPDATA_PATH}/homepage/config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${MEDIA_PATH}:/mnt/user/data:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/healthcheck || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - infra

  # ─── Uptime Kuma — service uptime monitoring and alerting ──────────────────
  # AI Integration: webhook alerts → n8n → Ollama analysis → Discord fix suggestions.
  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: uptime-kuma
    restart: unless-stopped
    ports:
      - "3010:3001"
    volumes:
      - ${APPDATA_PATH}/uptime-kuma:/app/data
    environment:
      - TZ=${TZ:-America/New_York}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/status-page/default || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - infra

  # ─── Dozzle — real-time Docker log viewer ──────────────────────────────────
  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: unless-stopped
    ports:
      - "8888:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - TZ=${TZ:-America/New_York}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthcheck || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - infra

  # ─── Watchtower — automatic container image updates ────────────────────────
  # Scheduled weekly (Sunday 3am) to avoid breaking things during third shift.
  # WATCHTOWER_SCHEDULE uses cron syntax: sec min hour day month weekday
  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    environment:
      - TZ=${TZ:-America/New_York}
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_SCHEDULE=0 0 3 * * 0
      - WATCHTOWER_NOTIFICATIONS=shoutrrr
      - WATCHTOWER_NOTIFICATION_URL=${WATCHTOWER_DISCORD_URL:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  # ─── Cloudflared — Cloudflare Zero-Trust tunnel ─────────────────────────────
  # Only tunnels: Overseerr (5055), Open WebUI on Node C, and Homepage (8010).
  # Eliminates need to open router ports for remote access.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    environment:
      - TZ=${TZ:-America/New_York}
    healthcheck:
      test: ["CMD-SHELL", "cloudflared tunnel info || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 3
    networks:
      - infra

networks:
  infra:
    name: infra
    driver: bridge
