# LiteLLM Proxy configuration for Node B Final (nodebfinal)
#
# Node B (Unraid) at 192.168.1.222 — RTX/CUDA with Ollama on :11434
#
# This config gives the entire lab a single OpenAI-compatible endpoint at
# http://192.168.1.222:4000/v1 — one URL, any model, zero vendor lock-in.
#
# Model routing:
#   Local (Node B Ollama):
#     brawn-fast      → dolphin-mistral:7b  (uncensored all-rounder)
#     brawn-code      → qwen2.5-coder:14b   (specialised code generation)
#     brawn-mini      → phi4-mini           (ultra-fast, low VRAM)
#     brawn-embed     → nomic-embed-text    (local embeddings)
#   Cross-node:
#     brain-heavy     → Node A qwen2.5:32b  (powerful 32B thinker, 20 GB VRAM)
#     brain-vision    → Node A llava:13b    (vision-language model)
#     intel-fast      → Node C phi4:latest  (fast Arc conversation)
#     intel-uncensored → Node C dolphin3:8b (uncensored Arc model)
#     intel-vision    → Node C llava:13b    (vision, legacy alias)
#
# Pull models on each node before enabling these routes:
#   Node A: ./scripts/pull-models.sh --node a
#   Node B: ./scripts/pull-models.sh --node b
#   Node C: ./scripts/pull-models.sh --node c
#   All:    ./scripts/pull-models.sh --all
#
# Client config examples:
#   curl:     Authorization: Bearer $LITELLM_MASTER_KEY
#   Home Assistant / OpenWebUI base_url: http://192.168.1.222:4000/v1
#   n8n:      POST http://192.168.1.222:4000/v1/chat/completions
#
# Master key is read from the LITELLM_MASTER_KEY environment variable.
# Never hard-code secrets here — use the .env file.

model_list:

  # ── Node B Local: Ollama on NVIDIA RTX 4070 (12 GB VRAM) ────────────────────

  # Uncensored all-rounder — chat, summarisation, light coding.
  # Pull: docker exec ollama ollama pull dolphin-mistral:7b
  - model_name: brawn-fast
    litellm_params:
      model: ollama/dolphin-mistral:7b
      api_base: http://localhost:11434
      timeout: 120
      rpm: 60

  # Specialised code model — generation, review, debugging.
  # Pull: docker exec ollama ollama pull qwen2.5-coder:14b
  - model_name: brawn-code
    litellm_params:
      model: ollama/qwen2.5-coder:14b
      api_base: http://localhost:11434
      timeout: 180
      rpm: 30

  # Ultra-fast lightweight model — quick classifications and simple prompts.
  # Pull: docker exec ollama ollama pull phi4-mini
  - model_name: brawn-mini
    litellm_params:
      model: ollama/phi4-mini
      api_base: http://localhost:11434
      timeout: 60
      rpm: 120

  # Embedding model — used by n8n AI nodes and Open WebUI RAG.
  # Pull: docker exec ollama ollama pull nomic-embed-text
  - model_name: brawn-embed
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: http://localhost:11434
      timeout: 30
      rpm: 200

  # ── Cross-node: Node A (AMD RX 7900 XT, ROCm, port 11435) ───────────────────
  # Node A Brain: i9-265F, 128 GB DDR5, RX 7900 XT (20 GB VRAM)
  # Start Node A: docker compose -f node-a-vllm/docker-compose.ollama.yml up -d
  # Pull model:   ./scripts/pull-models.sh --node a

  # 32B reasoning model — best quality thinker, fits in 20 GB VRAM.
  - model_name: brain-heavy
    litellm_params:
      model: ollama/qwen2.5:32b
      api_base: http://192.168.1.9:11435
      timeout: 240
      rpm: 20

  # Vision-language model — send base64 images in the messages array.
  - model_name: brain-vision
    litellm_params:
      model: ollama/llava:13b
      api_base: http://192.168.1.9:11435
      timeout: 180
      rpm: 15
    model_info:
      supports_vision: true

  # ── Cross-node: Node C (Intel Arc A770, port 11434) ─────────────────────────
  # Node C Arc: Ryzen 7 7700X, 32 GB RAM, Intel Arc A770 (16 GB VRAM)
  # Pull models: ./scripts/pull-models.sh --node c

  # Fast conversational model on Intel Arc.
  - model_name: intel-fast
    litellm_params:
      model: ollama/phi4:latest
      api_base: http://192.168.1.6:11434
      timeout: 120
      rpm: 40

  # Uncensored model on Intel Arc — low-latency unfiltered responses.
  - model_name: intel-uncensored
    litellm_params:
      model: ollama/dolphin3:8b
      api_base: http://192.168.1.6:11434
      timeout: 120
      rpm: 40

  # Legacy vision alias — kept for backward compatibility.
  - model_name: intel-vision
    litellm_params:
      model: ollama/llava:13b
      api_base: http://192.168.1.6:11434
      timeout: 180
      rpm: 20
    model_info:
      supports_vision: true

general_settings:
  # Read master key from environment variable — never hard-code here.
  master_key: os.environ/LITELLM_MASTER_KEY

  # Batch DB writes every 60 s to reduce write pressure.
  proxy_batch_write_at: 60

  # Disable telemetry — keep all data local.
  disable_error_logs: false
  json_logs: true

router_settings:
  # Prefer the fastest healthy backend; fall back on errors.
  routing_strategy: simple-shuffle
  num_retries: 2
  retry_after: 5
