---
# Homepage top-bar widgets — Node B Final
# https://gethomepage.dev/widgets/

- resources:
    cpu: true
    memory: true
    disk: /mnt/user
    label: Node B (Unraid)

- datetime:
    text_size: xl
    format:
      timeStyle: short
      dateStyle: short
      hour12: true

- search:
    provider: duckduckgo
    target: _blank

