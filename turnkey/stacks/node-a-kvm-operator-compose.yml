services:
  kvm-operator:
    image: python:3.12-slim
    container_name: kvm-operator
    restart: unless-stopped
    working_dir: /app
    command: >
      bash -lc "pip install --no-cache-dir -r requirements.txt &&
      uvicorn app:app --host 0.0.0.0 --port 5000"
    env_file:
      - ./kvm-operator.env
    volumes:
      - ../../kvm-operator:/app:ro
    ports:
      - "5000:5000"
