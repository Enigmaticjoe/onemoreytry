# Grand Unified AI Home Lab - Nextcloud Stack
# Node B (Brawn) - Unraid at 192.168.1.222
#
# Self-hosted personal cloud storage — your own Google Drive / Dropbox.
#
#   nextcloud:    Main app with HTTPS on port 9443
#   nextcloud-db: MariaDB database backend
#
# AI Integration:
#   Nextcloud can be used to store AI-generated documents, reports, and
#   notes created by Open WebUI or automation workflows.
#
# Usage:
#   cp stacks/.env.example stacks/.env
#   docker compose -f stacks/nextcloud-stack.yml up -d

services:

  # ─── MariaDB — Nextcloud database ──────────────────────────────────────────
  nextcloud-db:
    image: lscr.io/linuxserver/mariadb:latest
    container_name: nextcloud-db
    restart: unless-stopped
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/New_York}
      - MYSQL_ROOT_PASSWORD=${NEXTCLOUD_DB_ROOT_PASSWORD:-changeme}
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_PASSWORD=${NEXTCLOUD_DB_PASSWORD:-changeme}
    volumes:
      - ${APPDATA_PATH}/nextcloud-db:/config
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - nextcloud

  # ─── Nextcloud — personal cloud storage ────────────────────────────────────
  nextcloud:
    image: lscr.io/linuxserver/nextcloud:latest
    container_name: nextcloud
    restart: unless-stopped
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/New_York}
    ports:
      - "9443:443"
    volumes:
      - ${APPDATA_PATH}/nextcloud:/config
      - ${MEDIA_PATH}/nextcloud-data:/data
    depends_on:
      nextcloud-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --no-check-certificate https://localhost:443/status.php | grep -q '\"installed\":true' || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 60s
    networks:
      - nextcloud

networks:
  nextcloud:
    name: nextcloud
    driver: bridge
