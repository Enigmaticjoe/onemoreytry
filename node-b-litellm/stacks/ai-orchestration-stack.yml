# Grand Unified AI Home Lab - AI Orchestration Stack
# Node B (Brawn) - Unraid at 192.168.1.222
#
# This stack powers the AI-integrated brain on Node B:
#   - Open WebUI:   Chat UI connected to LiteLLM gateway
#   - Qdrant:       Vector database for AI memory / RAG
#   - Redis:        Fast in-memory cache for AI sessions
#   - SearXNG:      Private search engine for AI web access
#   - TEI Embed:    Local text embedding model (CPU/GPU)
#   - Browserless:  Headless browser for AI web scraping
#
# AI Integration:
#   Open WebUI → LiteLLM (port 4000) for model routing
#   Open WebUI → SearXNG (port 8082) for live web search
#   Open WebUI → TEI Embed (port 8881) for RAG embeddings
#   Open WebUI → Qdrant (port 6333) for long-term memory
#
# Usage:
#   cp stacks/.env.example stacks/.env
#   docker compose -f stacks/ai-orchestration-stack.yml up -d

services:

  # ─── Redis — fast session/cache store for Open WebUI ───────────────────────
  hf-redis:
    image: redis:alpine
    container_name: hf-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - ${APPDATA_PATH}/hf-redis:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - ai_orchestration

  # ─── Qdrant — vector database for RAG / AI long-term memory ────────────────
  hf-qdrant:
    image: qdrant/qdrant:latest
    container_name: hf-qdrant
    restart: unless-stopped
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ${APPDATA_PATH}/hf-qdrant:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/readyz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - ai_orchestration

  # ─── Text Embeddings Inference — local embedding model (no OpenAI needed) ───
  hf-tei-embed:
    image: ghcr.io/huggingface/text-embeddings-inference:89-1.8
    container_name: hf-tei-embed
    restart: unless-stopped
    # NVIDIA GPU acceleration for faster embedding generation
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    ports:
      - "8881:80"
    volumes:
      - ${APPDATA_PATH}/hf-tei-data:/data
    command: ["--model-id", "${TEI_MODEL_ID:-BAAI/bge-small-en-v1.5}", "--port", "80"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - ai_orchestration

  # ─── SearXNG — private self-hosted search (feeds AI web searches) ───────────
  hf-searxng:
    image: searxng/searxng:latest
    container_name: hf-searxng
    restart: unless-stopped
    environment:
      - SEARXNG_BASE_URL=http://192.168.1.222:8082
      - SEARXNG_SECRET_KEY=${SEARXNG_SECRET_KEY:-change-me-please}
    ports:
      - "8082:8080"
    volumes:
      - ${APPDATA_PATH}/hf-searxng:/etc/searxng
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - ai_orchestration

  # ─── Browserless — headless Chrome for AI web scraping / automation ─────────
  hf-browserless:
    image: browserless/chrome:latest
    container_name: hf-browserless
    restart: unless-stopped
    environment:
      - MAX_CONCURRENT_SESSIONS=5
      - MAX_QUEUE_LENGTH=20
      - TOKEN=${BROWSERLESS_TOKEN:-your-secret-token}
      - TIMEOUT=30000
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/pressure || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - ai_orchestration

  # ─── Open WebUI — AI chat interface (connects to LiteLLM + all above) ────────
  hf-openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: hf-openwebui
    restart: unless-stopped
    environment:
      # LiteLLM gateway — gives access to all AI models across all nodes
      - OPENAI_API_BASE_URL=http://192.168.1.222:4000/v1
      - OPENAI_API_KEY=${LITELLM_MASTER_KEY:-sk-master-key}
      # Qdrant RAG memory
      - VECTOR_DB=qdrant
      - QDRANT_URI=http://hf-qdrant:6333
      # Local text embeddings (no OpenAI API cost)
      - RAG_EMBEDDING_ENGINE=openai
      - RAG_OPENAI_API_BASE_URL=http://hf-tei-embed:80/v1
      - RAG_OPENAI_API_KEY=none
      # SearXNG web search
      - ENABLE_RAG_WEB_SEARCH=true
      - RAG_WEB_SEARCH_ENGINE=searxng
      - SEARXNG_QUERY_URL=http://hf-searxng:8080/search?q=<query>&format=json
      # Redis session cache
      - REDIS_URL=redis://hf-redis:6379/0
      # Branding
      - WEBUI_NAME=Happy Struggle Bus AI
      - TZ=${TZ:-America/New_York}
    ports:
      - "3002:8080"
    volumes:
      - ${APPDATA_PATH}/hf-openwebui:/app/backend/data
    depends_on:
      hf-redis:
        condition: service_healthy
      hf-qdrant:
        condition: service_healthy
      hf-tei-embed:
        condition: service_healthy
      hf-searxng:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - ai_orchestration

networks:
  ai_orchestration:
    name: ai_orchestration
    driver: bridge
