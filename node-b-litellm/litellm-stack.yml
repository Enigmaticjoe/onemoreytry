# Grand Unified AI Home Lab - LiteLLM Gateway Stack
# Deploy on Node B (Brawn) - Unraid Server at 192.168.1.222
#
# This stack runs the LiteLLM proxy that unifies all AI nodes into a single API endpoint.
# Hardware: i5-13600K, 96GB DDR5, RTX 4070 (12GB)
#
# Usage:
#   docker compose -f litellm-stack.yml up -d

version: "3.9"

services:
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm_gateway
    restart: unless-stopped
    
    # Using host network mode for easier inter-node communication on Unraid
    # Alternative: map port 4000:4000 if you prefer bridge networking
    network_mode: host
    
    environment:
      LITELLM_LOG: INFO
      JSON_LOGS: "true"
      WORKERS: "4"
    
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
