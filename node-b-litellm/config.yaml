# LiteLLM Proxy configuration for Grand Unified AI Home Lab
#
# This configuration routes requests to the correct physical nodes:
# - Brain (Node A): RX 7900 XT at 192.168.1.9:8000
# - Brawn (Node B): RTX 4070 running vLLM at 192.168.1.222:8002
# - Command Center (Node C): Intel Arc A770 running Ollama at 192.168.1.6:11434
#
# API Key for Home Assistant and other clients: sk-master-key

model_list:
  # Brain (Node A) - Heavy Logic/Reasoning
  # Hardware: Core Ultra 7 265KF, 128GB DDR5, RX 7900 XT (20GB)
  # Reality check: do not assume practical 70B throughput on 20GB VRAM without proven quantization/offload.
  # Start with a feasible profile (8B/14B class), then promote only after measured latency + stability testing.
  - model_name: brain-heavy
    litellm_params:
      model: openai/chat
      api_base: http://192.168.1.9:8000/v1
      rpm: 60
      timeout: 180

  # Brawn (Node B) - Fast Chat (local vLLM)
  # Hardware: i5-13600K, 96GB DDR5, RTX 4070 (12GB)
  # Running: vLLM on port 8002 (mapped from internal 8000)
  - model_name: brawn-fast
    litellm_params:
      model: openai/chat
      api_base: http://192.168.1.222:8002/v1
      rpm: 100
      timeout: 120

  # Command Center (Node C) - Vision AI
  # Hardware: Ryzen 7 7700X, 32GB RAM, Intel Arc A770 (16GB)
  # Running: Ollama with Llava for vision tasks
  - model_name: intel-vision
    litellm_params:
      model: ollama/llava
      api_base: http://192.168.1.6:11434
      timeout: 180
    model_info:
      supports_vision: True

general_settings:
  master_key: sk-master-key
  proxy_batch_write_at: 60
  database_connection_pool_limit: 10

router_settings:
  routing_strategy: usage-based-routing
