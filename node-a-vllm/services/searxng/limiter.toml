# SearXNG rate limiter configuration for Brain Project
# https://docs.searxng.org/admin/searxng-admin.html#limiter

[real_ip]
# Trust X-Forwarded-For header from local network only
x_for = 1
ipv4_prefix = 32
ipv6_prefix = 48

[botdetection.ip_limit]
# Allow higher rate for local use
link_token = false

[botdetection.ip_lists]
block_ip = []
pass_ip = [
  "172.30.0.0/16",
  "192.168.0.0/16",
  "10.0.0.0/8",
  "127.0.0.0/8"
]
