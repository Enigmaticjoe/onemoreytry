# Portainer stack for NanoClaw on Unraid Node B (192.168.1.222)
# Compose Specification format (no `version` key).
#
# Security note:
# - /var/run/docker.sock is mounted so NanoClaw can spawn isolated worker containers.
# - Anyone with access to NanoClaw runtime effectively has Docker-level control of host.

name: nanoclaw-stack

services:
  nanoclaw:
    # Build local image from Dockerfile.nanoclaw.
    build:
      context: .
      dockerfile: Dockerfile.nanoclaw
    image: local/nanoclaw:latest
    container_name: nanoclaw
    restart: unless-stopped
    network_mode: host
    user: "99:100"
    environment:
      TZ: America/New_York
      PUID: "99"
      PGID: "100"
      NODE_ENV: production
      # Main provider routed to local Ollama OpenAI-compatible endpoint.
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-http://192.168.1.222:11434/v1}
      ANTHROPIC_AUTH_TOKEN: ${ANTHROPIC_AUTH_TOKEN:-ollama}
      # Default model routing hints for bootstrap scripts / wrappers.
      DEFAULT_AGENT_MODEL: ${DEFAULT_AGENT_MODEL:-qwen3:14b-abliterated}
      FAST_AGENT_MODEL: ${FAST_AGENT_MODEL:-glm4-flash-heretic}
      COMPLEX_AGENT_BASE_URL: ${COMPLEX_AGENT_BASE_URL:-http://NODE_A_TAILSCALE:8000/v1}
      COMPLEX_AGENT_MODEL: ${COMPLEX_AGENT_MODEL:-qwen3-14b-awq}
      FALLBACK_AGENT_MODEL: ${FALLBACK_AGENT_MODEL:-josiefied-qwen3:8b}
      # Messaging (fill in after deploy)
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-REPLACE_ME}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-REPLACE_ME}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-REPLACE_ME}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
    working_dir: /opt/nanoclaw
    volumes:
      - /mnt/user/appdata/nanoclaw:/opt/nanoclaw/data
      - /mnt/user/appdata/nanoclaw/workspace:/opt/nanoclaw/workspace
      - /mnt/user/appdata/nanoclaw/.env:/opt/nanoclaw/.env
      - /mnt/user/appdata/nanoclaw/.mcp.json:/opt/nanoclaw/.mcp.json
      - /mnt/user/appdata/nanoclaw/agents:/opt/nanoclaw/agents
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${NANOCLAW_HEALTH_PORT:-3000}/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

  # Option B (containerized UnraidClaw): disabled by default.
  # Enable in Portainer by setting COMPOSE_PROFILES=unraidclaw-container
  unraidclaw:
    profiles: ["unraidclaw-container"]
    image: node:22-alpine
    container_name: unraidclaw
    restart: unless-stopped
    network_mode: host
    user: "99:100"
    working_dir: /opt/unraidclaw
    environment:
      TZ: America/New_York
      PUID: "99"
      PGID: "100"
      NODE_ENV: production
      UNRAIDCLAW_BIND_HOST: 0.0.0.0
      UNRAIDCLAW_PORT: "9876"
      # Generate and populate via deploy.sh, never hardcode production key.
      UNRAIDCLAW_API_KEY: ${UNRAIDCLAW_API_KEY:-GENERATE_ME}
      UNRAIDCLAW_TLS_CERT_PATH: /opt/unraidclaw/certs/tls.crt
      UNRAIDCLAW_TLS_KEY_PATH: /opt/unraidclaw/certs/tls.key
      UNRAID_GRAPHQL_URL: ${UNRAID_GRAPHQL_URL:-https://192.168.1.222/graphql}
    command: >
      sh -c "npm install -g unraidclaw && unraidclaw --config /opt/unraidclaw/config/unraidclaw-openclaw-config.json"
    volumes:
      - /mnt/user/appdata/unraidclaw:/opt/unraidclaw
      - /var/run/docker.sock:/var/run/docker.sock
      # Optional readonly mounts used by some Unraid/system tooling.
      - /boot:/host/boot:ro
      - /mnt:/host/mnt

  # Lightweight local model-router sidecar for complexity-aware endpoint selection.
  model-router:
    image: python:3.12-alpine
    container_name: nanoclaw-model-router
    restart: unless-stopped
    network_mode: host
    user: "99:100"
    working_dir: /app
    environment:
      TZ: America/New_York
      ROUTER_LISTEN: 0.0.0.0
      ROUTER_PORT: "18080"
      OLLAMA_BASE_URL: ${ANTHROPIC_BASE_URL:-http://192.168.1.222:11434/v1}
      VLLM_BASE_URL: ${COMPLEX_AGENT_BASE_URL:-http://NODE_A_TAILSCALE:8000/v1}
      DEFAULT_MODEL: ${DEFAULT_AGENT_MODEL:-qwen3:14b-abliterated}
      FAST_MODEL: ${FAST_AGENT_MODEL:-glm4-flash-heretic}
      COMPLEX_MODEL: ${COMPLEX_AGENT_MODEL:-qwen3-14b-awq}
      FALLBACK_MODEL: ${FALLBACK_AGENT_MODEL:-josiefied-qwen3:8b}
    volumes:
      - /mnt/user/appdata/nanoclaw/router:/app
    command: >
      sh -c "python -m pip install --no-cache-dir fastapi uvicorn httpx &&
      python /app/router.py"
