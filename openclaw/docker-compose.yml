# ═══════════════════════════════════════════════════════════════════════════════
# OpenClaw AI Gateway — Portainer Stack for Unraid
# https://github.com/openclaw/openclaw
# Unraid support thread: https://forums.unraid.net/topic/196865-support-openclaw-ai-personal-assistant
#
# ┌─────────────────────────────────────────────────────────────────────────┐
# │  STEP 1 — Create data directories (SSH into Unraid)                     │
# │                                                                         │
# │  mkdir -p /mnt/user/appdata/openclaw/{config,workspace,homebrew}        │
# │                                                                         │
# │  STEP 2 — Copy and edit openclaw.json                                   │
# │                                                                         │
# │  cp openclaw/openclaw.json /mnt/user/appdata/openclaw/config/           │
# │  # Edit it: set your vLLM model ID, remove unused provider blocks       │
# │  # Get model ID: curl http://<UNRAID_IP>:8880/v1/models | jq '.data[].id' │
# │                                                                         │
# │  STEP 3 — Generate a gateway token                                      │
# │                                                                         │
# │  openssl rand -hex 24                                                   │
# │  # Paste into OPENCLAW_GATEWAY_TOKEN below                              │
# │                                                                         │
# │  STEP 4 — Get your Unraid API key (optional, for server control)        │
# │                                                                         │
# │  Unraid WebGUI → Settings → Management Access → API Keys → Create       │
# │                                                                         │
# │  STEP 5 — Get Home Assistant token (optional, for smart home control)   │
# │                                                                         │
# │  HA → Profile → Long-Lived Access Tokens → Create Token                 │
# │  Set HOME_ASSISTANT_URL to local URL OR Nabu Casa cloud URL:            │
# │    Local:      http://192.168.1.x:8123                                  │
# │    Nabu Casa:  https://xxxxx.ui.nabu.casa                               │
# │                                                                         │
# │  STEP 6 — Paste this file into Portainer → Stacks → Add Stack           │
# │                                                                         │
# │  STEP 7 — Access the Control UI (same port, token in URL)               │
# │                                                                         │
# │  http://<UNRAID_IP>:18789/?token=<OPENCLAW_GATEWAY_TOKEN>               │
# └─────────────────────────────────────────────────────────────────────────┘
#
# YOUR UNRAID SERVICES REFERENCED BY THIS STACK:
#   hf-vllm      :8880/v1  ← primary AI model (local, private, free)
#   hf-searxng   :8082     ← local web search (no API key required)
#   hf-qdrant    :6333     ← vector store (agent memory)
#   browserless  :3005     ← browser automation
#   hf-openwebui :3002     ← point at http://<UNRAID_IP>:18789/v1 for chat UI
#   Home Asst    :8123     ← or Nabu Casa: https://xxxxx.ui.nabu.casa
#   Unraid API   :80/graphql ← Docker/VM/array/system control via agents
# ═══════════════════════════════════════════════════════════════════════════════

version: "3.9"

services:

  openclaw-gateway:
    # Official pre-built image from GitHub Container Registry.
    # No local build needed — this is the same image used by the Unraid CA template.
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw-gateway
    # REQUIRED: container must run as root (official template requirement)
    user: root
    hostname: OpenClaw
    restart: unless-stopped
    init: true

    # Startup command (mirrors the official Unraid CA template PostArgs):
    # 1. Creates config dir if missing
    # 2. Writes a default openclaw.json if one doesn't already exist
    # 3. Starts the gateway bound to LAN
    # NOTE: If /mnt/user/appdata/openclaw/config/openclaw.json already exists
    #       (from STEP 2 above), the default is NOT written — your config is used.
    command:
      - sh
      - -c
      - >
        mkdir -p /root/.openclaw /home/linuxbrew &&
        [ -s /root/.openclaw/openclaw.json ] ||
        echo '{"gateway":{"mode":"local","bind":"lan","controlUi":{"allowInsecureAuth":true},"auth":{"mode":"token"}}}' > /root/.openclaw/openclaw.json &&
        exec node dist/index.js gateway --bind lan

    ports:
      # ALL traffic on ONE port: WebSocket gateway + OpenAI-compat API +
      # Control UI (?token=...) + Webhooks (/hooks/*) + Health
      - "18789:18789"

    environment:
      HOME: /root
      TERM: xterm-256color

      # PATH must include Homebrew so skills that need brew/go tools work.
      # Do not remove entries from this PATH.
      PATH: /home/linuxbrew/.linuxbrew/bin:/home/linuxbrew/.linuxbrew/sbin:/root/.bun/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

      # ── Gateway Auth (REQUIRED) ──────────────────────────────────────────
      # Generate: openssl rand -hex 24
      # Access UI: http://<UNRAID_IP>:18789/?token=<this value>
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}

      # ══════════════════════════════════════════════════════════════════════
      # HOME ASSISTANT — Smart Home Control
      # Works with both local HA and Nabu Casa remote access.
      #
      # Local URL:     http://192.168.1.x:8123
      # Nabu Casa URL: https://xxxxx.ui.nabu.casa  ← copy from HA → Settings
      #                → System → Network → Home Assistant Cloud
      #
      # Token: HA → Profile → Long-Lived Access Tokens → Create Token
      # (give it a descriptive name like "openclaw")
      #
      # Once set, ask your agent:
      #   "Turn off the living room lights"
      #   "Is the garage door closed?"
      #   "Set thermostat to 72 degrees"
      #   "Activate the movie mode scene"
      #   "Run the good morning automation"
      # ══════════════════════════════════════════════════════════════════════
      HOME_ASSISTANT_URL: ${HOME_ASSISTANT_URL:-}
      HOME_ASSISTANT_TOKEN: ${HOME_ASSISTANT_TOKEN:-}

      # ══════════════════════════════════════════════════════════════════════
      # UNRAID SERVER CONTROL
      # Get key: Unraid WebGUI → Settings → Management Access → API Keys
      # GraphQL endpoint: http://host.docker.internal/graphql
      #
      # Example prompts:
      #   "List all running Docker containers"
      #   "What's my array status and disk temperatures?"
      #   "Restart the sonarr container"
      #   "How much free space do I have on cache?"
      # ══════════════════════════════════════════════════════════════════════
      UNRAID_API_KEY: ${UNRAID_API_KEY:-}
      UNRAID_URL: ${UNRAID_URL:-http://host.docker.internal}

      # ══════════════════════════════════════════════════════════════════════
      # LOCAL AI — vLLM (your hf-vllm container on port 8880)
      # Setting VLLM_API_KEY activates the vllm provider (any value works).
      # The baseUrl http://host.docker.internal:8880/v1 is set in openclaw.json.
      # ══════════════════════════════════════════════════════════════════════
      VLLM_API_KEY: ${VLLM_API_KEY:-vllm-local}

      # ══════════════════════════════════════════════════════════════════════
      # CLOUD AI PROVIDERS
      # Set keys for whichever you subscribe to.
      # These are used as fallbacks when vLLM is unavailable, or can be set
      # as primary in openclaw.json → agents.defaults.model.primary
      # ══════════════════════════════════════════════════════════════════════

      # Anthropic — claude-opus-4-6, claude-sonnet-4-6, claude-haiku-4-5
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Multiple keys rotated automatically on rate-limit:
      # ANTHROPIC_API_KEYS: ${ANTHROPIC_API_KEYS:-}

      # OpenAI — gpt-4o, gpt-4o-mini, o3, o4-mini
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # OPENAI_API_KEYS: ${OPENAI_API_KEYS:-}

      # Google Gemini — gemini-2.0-flash, gemini-2.5-pro
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      # GEMINI_API_KEYS: ${GEMINI_API_KEYS:-}

      # OpenRouter — 200+ models, good free-tier fallback
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}

      # xAI Grok
      XAI_API_KEY: ${XAI_API_KEY:-}

      # Groq (very fast inference, free tier available)
      GROQ_API_KEY: ${GROQ_API_KEY:-}

      # Mistral
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}

      # Cerebras (fast inference)
      CEREBRAS_API_KEY: ${CEREBRAS_API_KEY:-}

      # Moonshot / Kimi K2 — confirmed working by forum users
      # Get key: platform.moonshot.ai
      MOONSHOT_API_KEY: ${MOONSHOT_API_KEY:-}

      # HuggingFace — access HF Inference API
      HF_TOKEN: ${HF_TOKEN:-}

      # GitHub Copilot (requires prior: node dist/index.js models auth login-github-copilot)
      COPILOT_GITHUB_TOKEN: ${COPILOT_GITHUB_TOKEN:-}

      # Z.AI / GLM models — get key at z.ai/model-api
      ZAI_API_KEY: ${ZAI_API_KEY:-}

      # ══════════════════════════════════════════════════════════════════════
      # MESSAGING CHANNELS
      # Can also be configured after install via the Control UI.
      # ══════════════════════════════════════════════════════════════════════
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      SLACK_APP_TOKEN: ${SLACK_APP_TOKEN:-}
      MATTERMOST_BOT_TOKEN: ${MATTERMOST_BOT_TOKEN:-}
      MATTERMOST_URL: ${MATTERMOST_URL:-}
      ZALO_BOT_TOKEN: ${ZALO_BOT_TOKEN:-}
      OPENCLAW_TWITCH_ACCESS_TOKEN: ${OPENCLAW_TWITCH_ACCESS_TOKEN:-}

      # ══════════════════════════════════════════════════════════════════════
      # SEARCH & TOOL APIs
      # hf-searxng at :8082 is configured in openclaw.json (no key needed).
      # ══════════════════════════════════════════════════════════════════════
      BRAVE_API_KEY: ${BRAVE_API_KEY:-}       # 2000 free queries/month at brave.com/search/api
      PERPLEXITY_API_KEY: ${PERPLEXITY_API_KEY:-}
      FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY:-}

      # ══════════════════════════════════════════════════════════════════════
      # VOICE
      # ══════════════════════════════════════════════════════════════════════
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY:-}

    volumes:
      # Config, sessions, credentials — maps to /root/.openclaw (runs as root)
      - /mnt/user/appdata/openclaw/config:/root/.openclaw

      # Agent workspace: files, memory, AGENTS.md, projects
      - /mnt/user/appdata/openclaw/workspace:/home/node/clawd

      # Optional: Homebrew (skills that need brew/go tools persist across restarts)
      # Install Homebrew once via console if you need it:
      #   NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
      - /mnt/user/appdata/openclaw/homebrew:/home/linuxbrew/.linuxbrew

    extra_hosts:
      # Reach all your Unraid containers and the Unraid API from inside OpenClaw:
      #   hf-vllm    → http://host.docker.internal:8880/v1
      #   hf-searxng → http://host.docker.internal:8082
      #   hf-qdrant  → http://host.docker.internal:6333
      #   HA local   → http://host.docker.internal:8123  (if not using Nabu Casa)
      #   Unraid API → http://host.docker.internal/graphql
      - "host.docker.internal:host-gateway"

    networks:
      - openclaw

    healthcheck:
      test:
        - CMD-SHELL
        - "wget -qO- http://localhost:18789/ 2>/dev/null | grep -q . || exit 1"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

    labels:
      net.unraid.docker.managed: "portainer"
      net.unraid.docker.icon: "https://raw.githubusercontent.com/jdhill777/openclaw-unraid/master/openclaw-icon.png"
      # Control UI is on the same port as the gateway — token in query string
      net.unraid.docker.webui: "http://[IP]:[PORT:18789]/?token=${OPENCLAW_GATEWAY_TOKEN}"

# ───────────────────────────────────────────────────────────────────────────
# AFTER FIRST DEPLOY
# ───────────────────────────────────────────────────────────────────────────
#
# NOTE: Use "node dist/index.js" instead of "openclaw" for all CLI commands
#       inside this container (e.g. node dist/index.js models list)
#
# 1. ACCESS CONTROL UI:
#    http://<UNRAID_IP>:18789/?token=<OPENCLAW_GATEWAY_TOKEN>
#
# 2. VERIFY vLLM IS DETECTED (Portainer → openclaw-gateway → Console):
#    node dist/index.js models list
#    → "vllm/your-model-id" should appear
#    Switch live: /model vllm/your-model-id  (in chat)
#
# 3. VERIFY HOME ASSISTANT CONNECTION (in chat or console):
#    "List my Home Assistant entities"
#    "Is the front door locked?"
#    Works with local URL or Nabu Casa — just needs HOME_ASSISTANT_URL set.
#
# 4. ADD MESSAGING CHANNELS (Portainer → Console):
#    node dist/index.js channels add --channel telegram --token <BOT_TOKEN>
#    node dist/index.js channels add --channel discord  --token <BOT_TOKEN>
#    (or add tokens as env vars and restart — both methods work)
#
# 5. PAIR TELEGRAM (after adding channel):
#    node dist/index.js pairing approve telegram <CODE>
#    (code is sent to your Telegram app from the bot)
#
# 6. CONNECT OPEN-WEBUI TO OPENCLAW (hf-openwebui on :3002):
#    Settings → Connections → Add OpenAI-compatible API
#    URL:   http://<UNRAID_IP>:18789/v1  (must enable in openclaw.json)
#    Key:   <OPENCLAW_GATEWAY_TOKEN>
#    Model: openclaw:main  (or agent:main)
#
# 7. AUTOMATE FROM UNRAID USER SCRIPTS PLUGIN:
#    curl -s -X POST http://localhost:18789/hooks/agent \
#      -H "Authorization: Bearer $OPENCLAW_GATEWAY_TOKEN" \
#      -H "Content-Type: application/json" \
#      -d '{"message":"Check array health and summarize disk temperatures"}'
#
# 8. APPROVE CONTROL UI DEVICE PAIRING (if you see 1008 error):
#    node dist/index.js devices list
#    node dist/index.js devices approve <DEVICE_ID>
#
# 9. OPTIONAL — INSTALL HOMEBREW (for skills needing brew/go tools):
#    NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
#    (ignore "Next steps" output — PATH is already configured via env var)
#
# SECURITY NOTE: Container runs as root (required by official template).
# For improved security, avoid exposing port 18789 to the internet.
# Use Tailscale or a reverse proxy with auth instead.
# ───────────────────────────────────────────────────────────────────────────

networks:
  openclaw:
    name: openclaw
    driver: bridge
