name: validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install pyyaml

      - name: Set executable bits
        run: chmod +x ./validate.sh || true

      - name: Run repo validation
        run: ./validate.sh

      - name: Run lightweight Python invariant tests
        run: python -m unittest discover -s tests -p "test_*.py" -v
