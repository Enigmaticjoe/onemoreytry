# Grand Unified AI Home Lab - Command Center (Node C)
# Deploy on Fedora 43 with Intel Arc A770 (16GB)
#
# Hardware: Ryzen 7 7700X, 32GB RAM, Intel Arc A770 (16GB)
# Role: Vision AI (Llava) & Whisper Audio
#
# FIXED: Now uses standard Ollama image with Intel Compute Runtime
# (No ROCm - Intel Arc uses /dev/dri and Intel OneAPI/Level Zero)

services:
  # Ollama service for Intel Arc A770
  ollama:
    image: ollama/ollama:latest
    container_name: ollama_intel_arc
    restart: unless-stopped
    
    # Host network for easy access from other nodes
    network_mode: host
    
    # Intel Arc GPU access via /dev/dri
    devices:
      - /dev/dri:/dev/dri
    
    volumes:
      - ollama-models:/root/.ollama
      - /dev/shm:/dev/shm
    
    environment:
      OLLAMA_HOST: "0.0.0.0:11434"
      
      # Intel Arc A770 specific settings
      # ZES_ENABLE_SYSMAN is REQUIRED for Intel Arc GPU support
      ZES_ENABLE_SYSMAN: "1"
      
      # Enable all available GPUs
      OLLAMA_NUM_GPU: "999"
      
      # Additional Intel GPU optimizations
      ONEAPI_DEVICE_SELECTOR: "level_zero:0"
      SYCL_CACHE_PERSISTENT: "1"
    
    shm_size: "16gb"
    
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Chimera Face (Open WebUI) for local management
  chimera_face:
    image: ghcr.io/open-webui/open-webui:main
    container_name: chimera_face
    restart: unless-stopped
    
    ports:
      - "3000:8080"
    
    environment:
      # Connect to Ollama on host network
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
      WEBUI_NAME: "Chimera Face - Command Center"
    
    volumes:
      - open-webui-data:/app/backend/data
    
    extra_hosts:
      - "host.docker.internal:host-gateway"
    
    depends_on:
      ollama:
        condition: service_healthy

volumes:
  ollama-models:
    name: command-center-ollama-models
  open-webui-data:
    name: command-center-webui-data
